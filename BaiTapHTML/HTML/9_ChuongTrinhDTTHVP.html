<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chương trình đào tạo - Danh sách định nghĩa</title>
    <style>
        body {
            /* Đường dẫn ảnh nền theo yêu cầu */
            background-image: url('../Images/colo3.png');
            background-size: cover;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            color: blue;
            text-align: center;
            text-transform: uppercase;
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* Thẻ bao ngoài danh sách định nghĩa */
        dl {
            margin: 0;
        }

        /* Thẻ dt - Tiêu đề mục (Tin học văn phòng, Tin học quản lý) */
        dt {
            color: red;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 18px;
            margin-top: 15px;
        }

        /* Thẻ dd - Nội dung chi tiết các môn học */
        dd {
            color: blue;
            font-weight: bold;
            margin-left: 40px; /* Tạo độ thụt đầu dòng giống trong hình */
            margin-bottom: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CHƯƠNG TRÌNH ĐÀO TẠO</h1>

        <dl>
            <dt>TIN HỌC VĂN PHÒNG</dt>
            <dd>Tin học căn bản & WindowsXP</dd>
            <dd>Soạn Thảo văn bản MicroSoft Word 2003</dd>
            <dd>Xử lý bảng tính MicroSoft Excel 2003</dd>

            <dt>TIN HỌC QUẢN LÝ</dt>
            <dd>Lập trình CSDL MicroSoft Access 2003</dd>
            <dd>Thiết kế trình chiếu MicroSoft PowerPoint 2003</dd>
        </dl>
    </div>

</body>
</html>
