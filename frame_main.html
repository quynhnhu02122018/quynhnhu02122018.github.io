<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Nội Dung Chính</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #DDF4FF;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
    }

    .placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #4A90E2;
    }

    .placeholder .icon {
        font-size: 5rem;
        margin-bottom: 25px;
        opacity: 0.7;
    }

    .placeholder h2 {
        font-size: 1.6rem;
        margin-bottom: 12px;
        color: #0066CC;
    }

    .placeholder p {
        font-size: 1rem;
        color: #4A90E2;
    }
</style>
</head>
<body>
    <div class="placeholder">
        <div class="icon">📄</div>
        <h2>Nội dung sẽ hiển thị ở đây</h2>
        <p>Vui lòng chọn bài học hoặc bài tập từ menu bên trái</p>
    </div>
</body>
</html>
